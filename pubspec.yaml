name: more_fish
description: "A new Flutter project."
publish_to: 'none'
version: 2.1.3+36
environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.2
  flutter_intl_phone_field: ^0.0.7
  internet_connection_checker: ^3.0.1
  http: ^1.5.0
  dartz: ^0.10.1
  url_launcher: ^6.3.2
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  dropdown_button2: ^2.3.9
  fl_chart: ^0.68.0
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.2.10
  image_picker: ^1.1.2
  uuid: ^4.5.1
  # flutter_easyloading removed



dev_dependencies:
  flutter_launcher_icons: "^0.14.4"
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0


flutter:
  generate: true
  uses-material-design: true
  assets:
